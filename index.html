<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Japanese vocabulary flashcard app for Minna no Nihongo lessons">
  <title>日本語 FlashCards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LESSON SELECT SCREEN -->
  <div id="screen-select" class="screen active">
    <header class="hero">
      <h1>日本語</h1>
      <p class="subtitle">Flash Cards</p>
    </header>
    <div id="lesson-list" class="lesson-list"></div>
  </div>

  <!-- FLASHCARD SCREEN -->
  <div id="screen-cards" class="screen">
    <nav class="topbar">
      <button id="btn-back" class="btn-icon" aria-label="Go back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      </button>
      <span id="topbar-title" class="topbar-title"></span>
      <span id="card-counter" class="card-counter"></span>
    </nav>

    <div class="card-area">
      <div id="flashcard" class="flashcard">
        <div class="card-inner">
          <div class="card-front">
            <span id="card-jp" class="card-jp"></span>
            <span id="card-reading" class="card-reading"></span>
          </div>
          <div class="card-back">
            <span id="card-meaning" class="card-meaning"></span>
          </div>
        </div>
      </div>
      <p class="hint">tap card to flip</p>
    </div>

    <div class="controls">
      <button id="btn-prev" class="btn-nav" aria-label="Previous card">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button id="btn-shuffle" class="btn-shuffle" aria-label="Shuffle cards">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>
      <button id="btn-next" class="btn-nav" aria-label="Next card">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- Progress bar -->
    <div class="progress-track">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
